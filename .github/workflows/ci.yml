name: Proto CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: buf lint + breaking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          # Cấu hình lint nằm trong buf.yaml (STANDARD trừ vài luật không hợp
          # layout phẳng 3 package + response tái dùng Product). breaking chặn
          # thay đổi phá vỡ contract so với main.
          lint: true
          format: false
          breaking: true
          breaking_against: "https://github.com/${{ github.repository }}.git#branch=main"
