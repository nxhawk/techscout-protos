name: Proto CI

# Scoped to proto-related paths only: editing docs/** (or the root README)
# must never run buf lint/breaking. This keeps documentation changes fully
# isolated from the proto contract guardrail — see docs/ci-flow.md.
on:
  push:
    branches: [main]
    paths:
      - "**/*.proto"
      - "buf.yaml"
      - "buf.gen.yaml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.proto"
      - "buf.yaml"
      - "buf.gen.yaml"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  lint:
    name: buf lint + breaking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          # Cấu hình lint nằm trong buf.yaml (STANDARD trừ vài luật không hợp
          # layout phẳng 3 package + response tái dùng Product). breaking chặn
          # thay đổi phá vỡ contract so với main.
          lint: true
          format: false
          breaking: true
          breaking_against: "https://github.com/${{ github.repository }}.git#branch=main"
