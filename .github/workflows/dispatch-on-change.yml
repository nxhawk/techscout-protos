name: Dispatch proto-updated

# When a .proto changes on main, notify only the services that consume it.
# Requires a repo secret DISPATCH_TOKEN: a PAT (or GitHub App token) with
# `contents: write` on the four consumer repos so repository_dispatch is allowed.
#
# The `paths: **/*.proto` filter below is what keeps documentation changes
# from ever bumping a consumer service: a commit that only touches docs/**
# doesn't match this filter, so this job never runs and no
# repository_dispatch is sent. See docs/ci-flow.md for the full picture.

on:
  push:
    branches: [main]
    paths:
      - "**/*.proto"
  workflow_dispatch:
    inputs:
      protos:
        description: "Space/newline-separated proto filenames to force-dispatch. Empty = all."
        default: ""

permissions:
  contents: read

env:
  OWNER: nxhawk

jobs:
  fan-out:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine changed protos
        id: changed
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          INPUT_PROTOS: ${{ github.event.inputs.protos }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            protos="${INPUT_PROTOS:-}"
            [ -z "$protos" ] && protos="$(ls *.proto)"
          elif [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            protos="$(ls *.proto)"
          else
            protos="$(git diff --name-only --diff-filter=d "$BEFORE" "$SHA" -- '*.proto' \
                      | xargs -r -n1 basename | sort -u)"
          fi
          echo "Changed protos:"; echo "$protos"
          {
            echo "protos<<EOF"
            echo "$protos"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Map protos -> consumer repos
        id: map
        env:
          PROTOS: ${{ steps.changed.outputs.protos }}
        run: |
          set -euo pipefail
          declare -A CONSUMERS=(
            ["product.proto"]="techscout-gateway techscout-product-service"
            ["recommend.proto"]="techscout-gateway techscout-rag-recommend"
            ["docs.proto"]="techscout-gateway techscout-rag-docs"
          )
          repos=""
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            repos="$repos ${CONSUMERS[$p]:-}"
          done <<< "$PROTOS"
          repos="$(echo "$repos" | tr ' ' '\n' | sed '/^$/d' | sort -u | tr '\n' ' ')"
          echo "Target repos: $repos"
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

      - name: Send repository_dispatch
        if: steps.map.outputs.repos != ''
        env:
          TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          REPOS: ${{ steps.map.outputs.repos }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          for repo in $REPOS; do
            echo "Dispatching proto-updated -> $OWNER/$repo"
            curl -sS -f -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$OWNER/$repo/dispatches" \
              -d "{\"event_type\":\"proto-updated\",\"client_payload\":{\"sha\":\"$SHA\",\"ref\":\"$REF\"}}"
          done
