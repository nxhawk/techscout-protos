name: Notify Discord

# Post to the team Discord channel on every push to main.
# Requires secret DISCORD_WEBHOOK = Discord channel webhook URL.
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMPARE: ${{ github.event.compare }}
          MSG: ${{ github.event.head_commit.message }}
          URL: ${{ github.event.head_commit.url }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "::warning::DISCORD_WEBHOOK is not set — skipping notification."
            exit 0
          fi
          short="${SHA:0:7}"
          payload=$(jq -n \
            --arg title  "🛰️ techscout-protos • new commit" \
            --arg desc   "$MSG" \
            --arg url    "$URL" \
            --arg repo   "$REPO" \
            --arg branch "$BRANCH" \
            --arg actor  "$ACTOR" \
            --arg short  "$short" \
            --arg compare "$COMPARE" \
            '{
              username: "proto-bot",
              embeds: [ {
                title: $title,
                description: (if ($desc | length) > 0 then $desc else "(no message)" end),
                url: $url,
                color: 3447003,
                fields: [
                  { name: "Repo",   value: $repo,   inline: true },
                  { name: "Branch", value: $branch, inline: true },
                  { name: "Commit", value: $short,  inline: true },
                  { name: "Author", value: $actor,  inline: true }
                ]
              } ],
              content: ("🔔 Proto updated — " + $compare)
            }')
          curl -sf -X POST -H "Content-Type: application/json" \
               -d "$payload" "$DISCORD_WEBHOOK"
          echo "Discord notification sent for commit $short."
