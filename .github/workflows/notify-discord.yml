name: Notify Discord

# Bắn thông báo lên kênh chat team (Discord) mỗi khi có commit mới lên main.
# Cần secret DISCORD_WEBHOOK = URL webhook của kênh Discord.
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - name: Gửi thông báo Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMPARE: ${{ github.event.compare }}
          MSG: ${{ github.event.head_commit.message }}
          URL: ${{ github.event.head_commit.url }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "::warning::DISCORD_WEBHOOK chưa được set — bỏ qua thông báo."
            exit 0
          fi
          short="${SHA:0:7}"
          payload=$(jq -n \
            --arg title  "🛰️ techscout-protos • commit mới" \
            --arg desc   "$MSG" \
            --arg url    "$URL" \
            --arg repo   "$REPO" \
            --arg branch "$BRANCH" \
            --arg actor  "$ACTOR" \
            --arg short  "$short" \
            --arg compare "$COMPARE" \
            '{
              username: "proto-bot",
              embeds: [ {
                title: $title,
                description: (if ($desc | length) > 0 then $desc else "(no message)" end),
                url: $url,
                color: 3447003,
                fields: [
                  { name: "Repo",   value: $repo,   inline: true },
                  { name: "Nhánh",  value: $branch, inline: true },
                  { name: "Commit", value: $short,  inline: true },
                  { name: "Bởi",    value: $actor,  inline: true }
                ]
              } ],
              content: ("🔔 Proto vừa cập nhật — " + $compare)
            }')
          curl -sf -X POST -H "Content-Type: application/json" \
               -d "$payload" "$DISCORD_WEBHOOK"
          echo "Đã gửi thông báo Discord cho commit $short."
